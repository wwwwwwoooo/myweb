<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>老弟商店导航</title>

    <style>

        *{

            margin:0;

            padding:0;

            box-sizing:border-box;

        }

        .clearfix::after {

            content: "";

            display: block;

            clear: both;

        }

        .nav {

            position: fixed;

            top: 0;

            left: 0;

            width: 100%;

            height: 50px;

            background-color: #333;

            color: #fff;

            line-height: 50px;

            z-index: 999;

        }

        .nav-left {

            float: left;

            margin-left: 20px;

        }

        .nav-left span {

            margin: 0 20px;

            cursor: pointer;

        }

        .nav-right {

            float: right;

            margin-right: 20px;

        }

        /*Banner 横幅区域*/

        .banner {

    width: 1200px;

    height: 200px;

    /* 背景图（高清电商图，不用你本地图片） */

    background-image: url("https://picsum.photos/id/612/1200/200");

    background-size: cover;

    background-position: center;

    margin: 50px auto 0;

    position: relative; /* 作业要求必须保留 */

}



/* 右下角文字（100% 按作业要求定位，只加阴影让文字更显眼） */

.banner-text {

    position: absolute; /* 作业要求 */

    bottom: 20px;        /* 作业要求 */

    right: 30px;         /* 作业要求 */

    color: #fff;

    font-size: 18px;     /* 作业要求 */

    /* 额外加阴影，防止背景太亮看不清字 */

    text-shadow: 0 0 8px rgba(0,0,0,0.7);

    font-weight: bold;

}

        .container {

            width: 1200px;

            margin: 0 auto;

        }

        /*商品筛选栏*/

        .filter {

            height: 45px;

            background-color: #f5f5f5;

            border: 1px solid #ddd;

            line-height: 45px;

            margin: 20px 0;

            padding: 0 20px;

        }

        .filter span {

            float: left;

            margin: 0 25px;

            cursor: pointer;

        }

        .filter span:hover {

            color: #f60;

        }

        /*商品列表区域*/

        .goods-list {

            overflow: hidden;

        }

        .goods-item {

            width: 270px;

            height: 360px;

            border: 1px solid #eee;

            float: left;

            margin: 15px 15px;

            text-align: center;

            position: relative;

        }

        .goods-item img {

            width: 200px;

            height: 200px;

            margin: 15px 0;

        }

        .goods-item .title {

            font-size: 14px;

            color: #333;

            margin: 5px 10px;

            height: 40px;

        }

        .goods-item .price {

            font-size: 18px;

            color: red;

            font-weight: bold;

            margin: 8px 0;

        }

        .goods-item .sales {

            font-size: 12px;

            color: #999;

        }

        /*热销角标*/

        .hot {

            position: absolute;

            top: -5px;

            right: 10px;

            width: 40px;

            height: 25px;

            background-color: red;

            color: #fff;

            line-height: 25px;

            font-size: 12px;

            text-align: center;

        }

        /*底部状态栏*/

        .footer {

            width: 100%;

            height: 60px;

            background-color: #333;

            color: #fff;

            text-align: center;

            line-height: 60px;

            margin-top: 30px;

        }

    </style>

</head>

<body>

    <!--顶部导航-->
